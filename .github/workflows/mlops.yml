name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "params.yaml"
      - "dvc.yaml"
      - "dvc.lock"
      - "run_stage.py"
      - "generate_data.py"
      - "requirements.txt"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

env:
  GCS_MODEL_KEY: models/latest/model.pkl

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest

    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
      eval_threshold: ${{ steps.read_metrics.outputs.eval_threshold }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Authenticate to Google Cloud Storage and DagsHub MLflow
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/sa-key.json" >> "$GITHUB_ENV"
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> "$GITHUB_ENV"
          echo "GCS_BUCKET=${{ secrets.GCS_BUCKET }}" >> "$GITHUB_ENV"

          echo "MLFLOW_TRACKING_URI=${{ secrets.DAGSHUB_TRACKING_URI }}" >> "$GITHUB_ENV"
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> "$GITHUB_ENV"
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> "$GITHUB_ENV"

      - name: Pull DVC data and model cache
        run: dvc pull

      - name: Reproduce DVC pipeline
        run: dvc repro

      - name: Read metrics
        id: read_metrics
        run: |
          python - <<'EOF'
          import json
          import os

          with open("outputs/metrics.json", "r", encoding="utf-8") as f:
              metrics = json.load(f)

          accuracy = metrics["accuracy"]
          eval_threshold = metrics.get("eval_threshold", 0.60)

          print(f"Accuracy: {accuracy}")
          print(f"Eval threshold: {eval_threshold}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"accuracy={accuracy}", file=f)
              print(f"eval_threshold={eval_threshold}", file=f)
          EOF

      - name: Upload latest model to Google Cloud Storage
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage

          bucket_name = os.environ["GCS_BUCKET"]
          model_key = os.environ.get("GCS_MODEL_KEY", "models/latest/model.pkl")

          client = storage.Client(project=os.environ.get("GCP_PROJECT_ID"))
          bucket = client.bucket(bucket_name)
          blob = bucket.blob(model_key)
          blob.upload_from_filename("models/model.pkl")

          print(f"Uploaded model to gs://{bucket_name}/{model_key}")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval Gate
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = float("${{ needs.train.outputs.eval_threshold }}")

          print(f"Accuracy: {accuracy}")
          print(f"Threshold: {threshold}")

          if accuracy < threshold:
              raise SystemExit(
                  f"Eval gate failed: accuracy={accuracy:.4f} < threshold={threshold:.4f}"
              )

          print("Eval gate passed.")
          EOF

  deploy:
    name: Deploy to VM
    needs: eval
    runs-on: ubuntu-latest

    steps:
      - name: Deploy through SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' '${{ secrets.VM_SSH_KEY }}' > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key

          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/vm_key "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" <<'EOF'
          set -e

          cd ~/Day21_Mlops-Lab_2A202600783_Thai-Thi-Yen-Nhi

          git fetch origin main
          git reset --hard origin/main

          source .venv/bin/activate
          python -m pip install -r requirements.txt

          sudo systemctl restart mlops-serve
          sleep 5

          sudo systemctl status mlops-serve --no-pager
          curl -f http://localhost:8000/health
          EOF